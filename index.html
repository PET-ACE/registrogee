<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Configurar Alertas - PontoWeb</title>
    
    <link rel="icon" type="image/png" href="https://github.com/luizhenrinq1-svg/testepontoweb/blob/main/Icone.png?raw=true">
    <link rel="manifest" href="./manifest.json">

    <!-- Dependências -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

    <style>
      body { background-color: #f3f4f6; color: #1f2937; font-family: 'Segoe UI', sans-serif; }
      .card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05); margin-bottom: 16px; border: 1px solid #f0f0f0; }
      .btn { transition: all 0.2s; }
      .btn:active { transform: scale(0.95); }
      @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(22, 163, 74, 0); } 100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); } }
      .pulse-btn { animation: pulse-green 2s infinite; }
      
      .fade-in { animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      
      .scale-up { animation: scaleUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
      @keyframes scaleUp { from { transform: scale(0.9) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
    </style>
  </head>
  <body>

    <div id="root" class="max-w-md mx-auto min-h-screen p-4 flex flex-col justify-center"></div>

    <script>
      // Endereço público do seu Google Apps Script Web App (Reimplantar como WEB APP, acesso ANYONE, e atualizar aqui)
      const API_URL = "https://script.google.com/macros/s/AKfycbweWz-_7h558UGvxVAvb_lP7vfL83ctga8ke_KE8djO4yRan1ySsHbcaufA56i5WNL5XQ/exec";
      
      // Chave Pública VAPID do Cloud Messaging do seu Firebase
      const VAPID_KEY = 'BBoKkzbg5v-PjBLtxOv7oQz-o9SEcnpdYu2cAawC_2WHozRfOyYnESz_lss2yA4BGnuO76II-NbwoKUqfaEN-S0';

      const firebaseConfig = {
        apiKey: "AIzaSyCn89LRlH1lksZ811--jb2jlB2iZS5NH1s",
        authDomain: "pontoweb-dc8dd.firebaseapp.com",
        projectId: "pontoweb-dc8dd",
        storageBucket: "pontoweb-dc8dd.firebasestorage.app",
        messagingSenderId: "465750633035",
        appId: "1:465750633035:web:282efd14b807e2a3823bce"
      };

      let messaging = null;
      try {
        firebase.initializeApp(firebaseConfig);
        messaging = firebase.messaging();
      } catch(e) { console.error("Erro ao carregar Firebase:", e); }

      const ExternalBridge = {
        request: async (action, payload = {}) => {
          const res = await fetch(API_URL, { 
            method: 'POST', 
            redirect: "follow", 
            body: JSON.stringify({ action, ...payload }) 
          });
          return await res.json();
        }
      };
      
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(err => console.error("SW Erro", err));
      }
    </script>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;
      const CACHE_AUTH = 'ponto_auth_data_decoupled';

      // Componente de ícones dinâmicos Lucide
      const Icon = ({ name, size = 24, className = "" }) => {
        const ref = useRef(null);
        useEffect(() => {
          if (ref.current) {
            lucide.createIcons({
              root: ref.current,
              nameAttr: 'data-lucide',
              attrs: { class: className }
            });
          }
        }, [name, size, className]);

        return (
          <span 
            ref={ref} 
            style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}
            dangerouslySetInnerHTML={{ __html: `<i data-lucide="${name}" width="${size}" height="${size}"></i>` }}
          />
        );
      };

      // Modal animado de feedbacks
      const Modal = ({ isOpen, type, title, message, onClose }) => {
        if (!isOpen) return null;

        const colors = {
          success: { bg: 'bg-green-100', text: 'text-green-600', icon: 'check-circle' },
          error: { bg: 'bg-red-100', text: 'text-red-600', icon: 'triangle-alert' },
          info: { bg: 'bg-blue-100', text: 'text-blue-600', icon: 'info' }
        };
        const theme = colors[type] || colors.info;

        return (
          <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[999] flex items-center justify-center p-4 fade-in">
            <div className="bg-white rounded-3xl p-8 shadow-2xl w-full max-w-sm text-center scale-up relative border border-gray-100">
              <div className={`w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 ${theme.bg} ${theme.text}`}>
                <Icon name={theme.icon} size={40} />
              </div>
              <h3 className="text-2xl font-bold text-gray-800 mb-2">{title}</h3>
              <p className="text-gray-500 mb-8 leading-relaxed text-sm font-medium">{message}</p>
              <button onClick={onClose} className="w-full bg-gray-900 text-white py-4 rounded-xl font-bold text-lg hover:scale-[1.02] active:scale-95 transition-all shadow-xl hover:shadow-2xl">
                Entendi
              </button>
            </div>
          </div>
        );
      };

      function NotificationPage() {
        const [user, setUser] = useState(null); 
        const [loading, setLoading] = useState(false);
        const [inputLink, setInputLink] = useState('');
        
        const [permStatus, setPermStatus] = useState(Notification.permission);
        const [fcmToken, setFcmToken] = useState(null);
        const [config, setConfig] = useState({ entrada: '', saida: '', antecedencia: 10, nome: '' });

        const [modal, setModal] = useState({ isOpen: false, title: '', message: '', type: 'info' });

        const showAlert = (title, message, type = 'info') => {
          setModal({ isOpen: true, title, message, type });
        };

        useEffect(() => {
          const params = new URLSearchParams(window.location.search);
          const urlId = params.get('id');

          if (urlId) {
             const auth = { id: urlId };
             localStorage.setItem(CACHE_AUTH, JSON.stringify(auth));
             setUser(auth);
          } else {
             const savedAuth = localStorage.getItem(CACHE_AUTH);
             if (savedAuth) {
                setUser(JSON.parse(savedAuth));
             }
          }
        }, []);

        useEffect(() => {
           if (user) {
             carregarConfiguracaoEUsuario();
           }
        }, [user]);

        const carregarConfiguracaoEUsuario = async () => {
          setLoading(true);
          try {
            const res = await ExternalBridge.request('obterConfiguracao', { id: user.id });
            if (res.success) {
              setConfig({
                entrada: res.entrada || '',
                saida: res.saida || '',
                antecedencia: res.antecedencia || 10,
                nome: res.nome || ''
              });
              await syncTokenSilencioso();
            } else {
              showAlert("Acesso Inválido", "Seu ID de acesso expirou ou é inválido.", "error");
              localStorage.removeItem(CACHE_AUTH);
              setUser(null);
            }
          } catch(e) {
            console.error("Erro ao carregar dados:", e);
          } finally {
            setLoading(false);
          }
        };

        const syncTokenSilencioso = async () => {
           if (!messaging) return;
           if (Notification.permission === 'granted') {
              try {
                 const reg = await navigator.serviceWorker.ready;
                 const token = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
                 if (token) {
                    setFcmToken(token);
                    await ExternalBridge.request('salvarToken', { id: user.id, fcmToken: token });
                 }
              } catch(e) { console.warn("Sincronização silenciosa falhou:", e); }
           }
        };

        const handleLogin = (e) => {
          e.preventDefault();
          try {
             if (inputLink.includes('id=')) {
                const parts = inputLink.split('id=');
                const id = parts[1].split('&')[0];
                if (id) {
                   const auth = { id };
                   localStorage.setItem(CACHE_AUTH, JSON.stringify(auth));
                   setUser(auth);
                } else showAlert("Erro", "ID não encontrado no link.", "error");
             } else {
                showAlert("Erro", "O link inserido não possui o ID de acesso.", "error");
             }
          } catch(err) { showAlert("Erro", "Link formatado incorretamente.", "error"); }
        };

        const enableNotifications = async () => {
          if (!messaging) return showAlert("Erro", "Este navegador não suporta notificações.", "error");
          
          setLoading(true);
          try {
             const p = await Notification.requestPermission();
             setPermStatus(p);
             
             if (p === 'granted') {
                const reg = await navigator.serviceWorker.ready;
                const token = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
                
                if (token) {
                   setFcmToken(token);
                   await ExternalBridge.request('salvarToken', { id: user.id, fcmToken: token });
                   showAlert("Sucesso!", "Seu dispositivo está pronto para receber os alertas push.", "success");
                } else {
                   showAlert("Aviso", "A permissão foi dada, mas falhou ao gerar as credenciais.", "error");
                }
             } else {
                showAlert("Permissão Negada", "Você precisa permitir notificações nas configurações do seu navegador.", "error");
             }
          } catch (err) {
             showAlert("Erro Técnico", err.message || err, "error");
          } finally {
             setLoading(false);
          }
        };

        const saveConfig = async () => {
           if(!user) return;
           setLoading(true);
           try {
              await ExternalBridge.request('salvarConfiguracao', { 
                 id: user.id, 
                 entrada: config.entrada, 
                 saida: config.saida, 
                 antecedencia: config.antecedencia 
              });
              showAlert("Configurações Salvas", "Os seus horários diários foram salvos no Google Sheets!", "success");
           } catch(e) {
              showAlert("Erro", "Falha de comunicação com o servidor: " + e.message, "error");
           } finally {
              setLoading(false);
           }
        };

        const sendLocalTest = () => {
           if (Notification.permission !== 'granted') return showAlert("Atenção", "Ative as notificações antes de testar.", "info");
           navigator.serviceWorker.ready.then(reg => {
              reg.showNotification("Teste Local 🔔", {
                 body: "O som e o sistema de notificações estão activos no seu telefone!",
                 icon: "https://github.com/luizhenrinq1-svg/testepontoweb/blob/main/Icone.png?raw=true",
                 vibrate: [500, 200, 500],
                 tag: 'test-notification'
              });
           });
        };

        const sendServerTest = async () => {
           if(!user) return;
           setLoading(true);
           try {
              const res = await ExternalBridge.request('testarPush', { id: user.id });
              if(res.success) {
                 showAlert("Alerta Enviado", "Comando recebido na nuvem. Aguarde a notificação push chegar.", "success");
              } else {
                 showAlert("Erro na Conexão", res.error, "error");
              }
           } catch(e) { 
              showAlert("Falha Técnica", e.message, "error"); 
           } finally { setLoading(false); }
        };

        if (!user) return (
           <div className="flex flex-col items-center justify-center min-h-screen fade-in p-4">
              <Modal isOpen={modal.isOpen} type={modal.type} title={modal.title} message={modal.message} onClose={() => setModal({...modal, isOpen: false})} />
              <div className="card w-full text-center max-w-sm">
                 <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600">
                    <Icon name="link" size={32} />
                 </div>
                 <h2 className="text-xl font-bold mb-2 text-gray-800">Alertas PontoWeb</h2>
                 <p className="text-gray-500 mb-6 text-sm">Cole o seu link do portal do ponto para identificar sua conta.</p>
                 <form onSubmit={handleLogin}>
                    <input value={inputLink} onChange={e=>setInputLink(e.target.value)} className="w-full p-4 border border-gray-200 rounded-xl mb-4 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all text-center font-medium" placeholder="Cole o link completo aqui..." />
                    <button className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-colors shadow-lg">Entrar</button>
                 </form>
              </div>
           </div>
        );

        return (
           <div className="pb-10 fade-in w-full px-4">
              <Modal isOpen={modal.isOpen} type={modal.type} title={modal.title} message={modal.message} onClose={() => setModal({...modal, isOpen: false})} />
              
              <div className="text-center mb-8 mt-4">
                 <img src="https://github.com/luizhenrinq1-svg/testepontoweb/blob/main/Icone.png?raw=true" className="w-20 h-20 mx-auto mb-3 drop-shadow-md rounded-2xl" />
                 <h1 className="text-2xl font-bold text-gray-800 tracking-tight">Meus Alertas</h1>
                 <p className="text-blue-500 text-xs uppercase tracking-widest font-semibold mt-1">Olá, {config.nome || 'Buscando cadastro...'}</p>
              </div>

              {/* PASSO 1: ATIVAÇÃO */}
              <div className="card">
                 <div className="flex items-center gap-3 mb-4">
                    <div className="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center font-bold text-gray-500">1</div>
                    <h3 className="font-bold text-lg text-gray-800">Conexão do Celular</h3>
                 </div>
                 
                 <div className="bg-gray-50 rounded-xl p-4 mb-4 border border-gray-100">
                    <div className="flex justify-between items-center">
                        <div className="flex items-center gap-2">
                           <div className={`w-3 h-3 rounded-full ${permStatus === 'granted' && fcmToken ? 'bg-green-500 animate-pulse' : 'bg-red-400'}`}></div>
                           <span className="text-sm font-semibold text-gray-600">{permStatus === 'granted' && fcmToken ? 'Ativado' : 'Inativo'}</span>
                        </div>
                    </div>
                 </div>
                 
                 <button onClick={enableNotifications} disabled={loading || (permStatus === 'granted' && fcmToken)} className={`w-full py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-all ${permStatus === 'granted' && fcmToken ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-blue-600 text-white shadow-lg hover:bg-blue-700'}`}>
                    {loading ? 'Processando...' : (permStatus === 'granted' && fcmToken ? <><Icon name="check" size={18}/> Conectado</> : 'ATIVAR NOTIFICAÇÕES PUSH')}
                 </button>
                 
                 {permStatus === 'granted' && (
                    <div className="grid grid-cols-2 gap-3 mt-4">
                       <button onClick={sendLocalTest} className="bg-white border border-gray-200 text-gray-600 py-3 rounded-xl font-bold text-xs hover:bg-gray-50 transition-colors flex flex-col items-center gap-1">
                          <Icon name="volume-2" size={16}/> Teste Local
                       </button>
                       <button onClick={sendServerTest} disabled={loading} className="bg-white border border-gray-200 text-blue-600 py-3 rounded-xl font-bold text-xs hover:bg-blue-50 transition-colors flex flex-col items-center gap-1">
                          <Icon name="cloud-lightning" size={16}/> Teste Nuvem
                       </button>
                    </div>
                 )}
              </div>

              {/* PASSO 2: HORÁRIOS */}
              <div className="card">
                 <div className="flex items-center gap-3 mb-6">
                    <div className="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center font-bold text-gray-500">2</div>
                    <h3 className="font-bold text-lg text-gray-800">Horários de Trabalho</h3>
                 </div>
                 
                 <div className="space-y-5">
                    <div className="grid grid-cols-2 gap-4">
                        <div>
                           <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-wider">Entrada</label>
                           <input type="time" value={config.entrada} onChange={e => setConfig({...config, entrada: e.target.value})} className="w-full p-3 pl-4 border border-gray-200 rounded-xl bg-gray-50 font-bold text-gray-800 text-lg text-center outline-none focus:border-blue-500 transition-colors" />
                        </div>
                        <div>
                           <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-wider">Saída</label>
                           <input type="time" value={config.saida} onChange={e => setConfig({...config, saida: e.target.value})} className="w-full p-3 pl-4 border border-gray-200 rounded-xl bg-gray-50 font-bold text-gray-800 text-lg text-center outline-none focus:border-blue-500 transition-colors" />
                        </div>
                    </div>

                    <div>
                       <label className="block text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-wider flex items-center gap-1"><Icon name="clock" size={12}/> Antecedência do Alerta</label>
                       <div className="relative">
                          <select value={config.antecedencia} onChange={e => setConfig({...config, antecedencia: e.target.value})} className="w-full p-3 border border-gray-200 rounded-xl bg-white text-gray-700 font-medium appearance-none outline-none focus:border-blue-500 transition-colors">
                             <option value="1">1 minuto antes</option>
                             <option value="5">5 minutos antes</option>
                             <option value="10">10 minutos antes (Padrão)</option>
                             <option value="15">15 minutos antes</option>
                             <option value="30">30 minutos antes</option>
                          </select>
                          <div className="absolute right-3 top-3.5 text-gray-400 pointer-events-none"><Icon name="chevron-down" size={16}/></div>
                       </div>
                    </div>
                 </div>

                 <button onClick={saveConfig} disabled={loading} className="w-full mt-8 bg-blue-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg active:scale-95 hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                    {loading ? <div className="animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent"></div> : 'Salvar Alterações'}
                 </button>
              </div>
           </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<NotificationPage />);
    </script>
  </body>
</html>
